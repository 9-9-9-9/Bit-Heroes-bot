name: 'Unit Tests'

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 8 is the project's declared minimum; 17 is a modern LTS.
        java: [ '8', '17' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Run tests
        run: mvn -B test
        env:
          # The suite is headless-safe (no Robot/screen capture); be explicit.
          MAVEN_OPTS: -Djava.awt.headless=true
